name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check
      - run: pnpm format:check
      - run: pnpm lint:check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm release:pack
      - run: pnpm release:jsr:dry-run
      - run: pnpm examples:check

  npm:
    name: Publish npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Read package identity
        id: package
        working-directory: packages/jit
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Check whether npm version already exists
        id: registry
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish public package with provenance
        if: steps.registry.outputs.published != 'true'
        working-directory: packages/jit
        run: npm publish
        env:
          # Optional bootstrap fallback. Remove NPM_TOKEN after trusted publishing is active.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Report existing npm version
        if: steps.registry.outputs.published == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."

  jsr:
    name: Publish JSR
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Publish TypeScript sources with provenance
        working-directory: packages/jit
        run: pnpm exec jsr publish

  github-release:
    name: Create GitHub release
    needs: [npm, jsr]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Create immutable release notes
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --verify-tag
          --title "JIT ${GITHUB_REF_NAME#v}"
          --generate-notes
