name: Sync repository settings

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Apply description, homepage, features, and topics
        run: node scripts/sync-repository-settings.mjs
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
